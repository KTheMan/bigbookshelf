name: Build Smart TV Packages

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate static build
        run: npx nuxt generate

      # ── webOS (LG) ──────────────────────────────────────────────────────────

      - name: Prepare webOS IPK structure
        run: |
          cp appinfo.json dist/
          cp assets/icon.png dist/assets/
          cp assets/largeIcon.png dist/assets/
          cp assets/splash.png dist/assets/

      - name: Package webOS IPK
        run: |
          VERSION=$(node -p "require('./appinfo.json').version")

          echo "2.0" > debian-binary

          mkdir -p CONTROL
          cat > CONTROL/control << EOF
          Package: com.bigbookshelf.tv
          Version: $VERSION
          Architecture: arm
          Maintainer: KTheMan
          Section: multimedia
          Priority: optional
          Description: Bigbookshelf (BBS) - Audiobookshelf client for LG webOS TV
          EOF

          tar czf control.tar.gz -C . CONTROL
          tar czf data.tar.gz -C dist .
          ar rcs bigbookshelf-webos.ipk debian-binary control.tar.gz data.tar.gz

      - name: Upload webOS IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigbookshelf-webos-ipk
          path: bigbookshelf-webos.ipk
          retention-days: 30

      # ── Tizen (Samsung) ─────────────────────────────────────────────────────

      - name: Package Tizen WGT
        run: |
          cp tizen/config.xml dist/
          cd dist && zip -r ../bigbookshelf-tizen.wgt . && cd ..

      - name: Upload Tizen WGT artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigbookshelf-tizen-wgt
          path: bigbookshelf-tizen.wgt
          retention-days: 30

      # ── dist (shared) ────────────────────────────────────────────────────────

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigbookshelf-dist
          path: dist/
          retention-days: 30

      # ── Release ──────────────────────────────────────────────────────────────

      - name: Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bigbookshelf-webos.ipk
            bigbookshelf-tizen.wgt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nav-tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: bigbookshelf-dist
          path: dist/

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run D-pad navigation tests
        run: npm run test:nav
        env:
          CI: true
          # Server credentials come from repo secrets only. Auth-gated tests
          # skip automatically when these are unset. Do NOT hardcode a server
          # URL here — public CI runner IPs are blocked by self-hosted servers.
          ABS_SERVE: ${{ secrets.ABS_SERVE }}
          ABS_USE: ${{ secrets.ABS_USE }}
          ABS_PASS: ${{ secrets.ABS_PASS }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
