name: Build Smart TV Packages

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate static build
        run: npx nuxt generate

      # ── webOS (LG) ──────────────────────────────────────────────────────────

      - name: Install webOS CLI (ares-package)
        run: npm install -g @webosose/ares-cli

      - name: Prepare webOS app directory
        run: |
          cp appinfo.json dist/
          cp assets/icon.png dist/assets/
          cp assets/largeIcon.png dist/assets/
          cp assets/splash.png dist/assets/

      - name: Package webOS IPK
        run: |
          # Use the official packager. A hand-rolled `ar` archive installs via
          # opkg but the webOS appInstallService rejects it ("ipk verified
          # failed", errorCode -5) because it lacks usr/palm/packages/<id>/
          # packageinfo.json and the webOS-Package-Format-Version control field.
          # ares-package produces the complete, verifiable layout. NOTE:
          # appinfo.json "version" MUST be numeric major.minor.micro (no -beta
          # suffix) or verification fails.
          ares-package dist -o .
          mv com.bigbookshelf.tv_*_all.ipk bigbookshelf-webos.ipk
          ls -la bigbookshelf-webos.ipk

      - name: Upload webOS IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigbookshelf-webos-ipk
          path: bigbookshelf-webos.ipk
          retention-days: 30

      # ── Tizen (Samsung) ─────────────────────────────────────────────────────

      - name: Package Tizen WGT
        run: |
          cp tizen/config.xml dist/
          cd dist && zip -r ../bigbookshelf-tizen.wgt . && cd ..

      - name: Upload Tizen WGT artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigbookshelf-tizen-wgt
          path: bigbookshelf-tizen.wgt
          retention-days: 30

      # ── dist (shared) ────────────────────────────────────────────────────────

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigbookshelf-dist
          path: dist/
          retention-days: 30

      # ── Release ──────────────────────────────────────────────────────────────

      - name: Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bigbookshelf-webos.ipk
            bigbookshelf-tizen.wgt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nav-tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: bigbookshelf-dist
          path: dist/

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ── Cloudflare IP allowlist (knnygrdn.com zone) ─────────────────────────
      # Temporarily allow this runner's IP through Cloudflare so auth-gated
      # tests can reach abs.knnygrdn.com. Skips cleanly when CF secrets aren't
      # set. Rule is always deleted at the end even if tests fail.
      # Requires secrets: CF_API_TOKEN (Zone:Firewall Services:Edit), CF_ZONE_ID
      - name: Allowlist runner IP on Cloudflare
        id: cf_rule
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "CF secrets not set, skipping allowlist"
            echo "rule_id=" >> $GITHUB_OUTPUT
            exit 0
          fi
          RUNNER_IP=$(curl -sf https://api.ipify.org)
          RULE_ID=$(curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/firewall/access_rules/rules" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"mode\":\"whitelist\",\"configuration\":{\"target\":\"ip\",\"value\":\"${RUNNER_IP}\"},\"notes\":\"CI run ${{ github.run_id }}\"}" \
            | jq -r '.result.id')
          echo "rule_id=${RULE_ID}" >> $GITHUB_OUTPUT

      - name: Run D-pad navigation tests
        run: npm run test:nav
        env:
          CI: true
          ABS_SERVE: ${{ secrets.ABS_SERVE }}
          ABS_USE: ${{ secrets.ABS_USE }}
          ABS_PASS: ${{ secrets.ABS_PASS }}
          ABS1_SERVE: ${{ secrets.ABS1_SERVE }}
          ABS1_USE: ${{ secrets.ABS1_USE }}
          ABS1_PASS: ${{ secrets.ABS1_PASS }}

      - name: Remove runner IP from Cloudflare allowlist
        if: always()
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          RULE_ID="${{ steps.cf_rule.outputs.rule_id }}"
          if [ -z "$CF_API_TOKEN" ] || [ -z "$RULE_ID" ]; then
            exit 0
          fi
          curl -sf -X DELETE \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/firewall/access_rules/rules/${RULE_ID}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
