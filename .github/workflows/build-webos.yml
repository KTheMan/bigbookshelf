name: Build webOS IPK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate static build
        run: npx nuxt generate

      - name: Prepare IPK structure
        run: |
          cp appinfo.json dist/
          cp assets/icon.png dist/
          cp assets/largeIcon.png dist/
          cp assets/splash.png dist/

      - name: Package IPK
        run: |
          VERSION=$(node -p "require('./appinfo.json').version")
          
          echo "2.0" > debian-binary
          
          mkdir -p CONTROL
          cat > CONTROL/control << EOF
          Package: com.bigbookshelf.tv
          Version: $VERSION
          Architecture: arm
          Maintainer: KTheMan
          Section: multimedia
          Priority: optional
          Description: Bigbookshelf (BBS) - Audiobookshelf client for LG webOS TV
          EOF

          tar czf control.tar.gz -C . CONTROL
          tar czf data.tar.gz -C dist .
          ar rcs bigbookshelf-webos.ipk debian-binary control.tar.gz data.tar.gz

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigbookshelf-webos-ipk
          path: bigbookshelf-webos.ipk
          retention-days: 30

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigbookshelf-webos-dist
          path: dist/
          retention-days: 30

      - name: Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bigbookshelf-webos.ipk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
